# ─────────────────────────────────────────────────────────────────
# Este workflow se ejecuta automáticamente cada día de semana
# a las 9:00 AM hora de Nueva York (14:00 UTC).
#
# También puedes ejecutarlo manualmente desde la pestaña "Actions"
# en tu repositorio de GitHub.
# ─────────────────────────────────────────────────────────────────

on:
  schedule:
    # Cada día de semana (lunes a viernes) a las 14:00 UTC = 9:00 AM ET
    - cron: '0 14 * * 1-5'

  # Permite ejecutar el workflow manualmente desde GitHub
  workflow_dispatch:
    inputs:
      razon:
        description: '¿Por qué ejecutas esto manualmente?'
        required: false
        default: 'Prueba manual'

jobs:
  enviar-alerta:
    name: Obtener datos y enviar alerta por email
    runs-on: ubuntu-latest

    steps:

      # 1. Descargar el código del repositorio
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      # 2. Configurar Python 3.11
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Instalar dependencias (solo las necesarias para el script de alertas)
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      # 4. Ejecutar el script de alertas
      #    Las variables de entorno vienen de los GitHub Secrets que configuraste
      - name: 📧 Ejecutar alerta diaria
        run: python daily_alert.py
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}
